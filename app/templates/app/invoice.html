<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn</title>
    <link rel="stylesheet" href="{% static 'app/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Hóa đơn của bạn</h1>
        <p>Ngày: {{ date|date:"d-m-Y H:i:s" }}</p>
        <table class="table">
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Số lượng</th>
                    <th>Giá</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.product.name }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>{{ item.get_total }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <h3>Tổng cộng: {{ total }}</h3>
    </div>
</body>
</html>
