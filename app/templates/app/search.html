{% extends 'app/base.html' %}
{% load static %}
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    {% block register %}
    <h5> Result search for {{searched}} </h5><br/>
   <div class="row" style="width:100%">
  {%for product in keys %}
  <div class="col-lg-4 col-md-6 mb-4">
    <div class="card">
      <img src="{{product.ImageURL}}" class="card-img-top" alt="Sửa rửa mặt" height="330px">
      <div class="card-body d-flex flex-column">
        <h6><strong>{{product.name}}</strong></h6>
        <hr>

        <div class="d-flex justify-content-between align-items-center">
          <button data-product={{product.id}} data-action= "add" class="btn btn-outline-secondary add-btn update-cart">Thêm vào giỏ hàng</button>
          <a class="btn btn-outline-success" href="{% url 'detail' %}?id={{product.id}}">Xem</a>
        </div>
        <h4 class="mt-3"><strong>{{product.price | floatformat:3}}VND</strong></h4>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
    {% endblock %}
</body>
</html>
